<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>C# Yol Haritası</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth;--primary:#512BD4;--secondary:#0078D4;--accent:#00BCF2;--success:#107C10;--danger:#D13438;--warning:#FFB900;--text-primary:#1f2937;--text-secondary:#6b7280}
@media(prefers-color-scheme:dark){html{--text-primary:#f3f4f6;--text-secondary:#d1d5db}body{background:#0d0f17;color:#f3f4f6}}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Roboto','Helvetica Neue',Arial,sans-serif;background:#fff;color:var(--text-primary);line-height:1.6;overflow-x:hidden}
#canvas-bg{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:0;opacity:0.4}
.container{position:relative;z-index:1;max-width:1100px;margin:0 auto;padding:0 1.5rem}
.hero{min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:flex-start;position:relative;padding:4rem 1.5rem}
.hero-eyebrow{font-size:12px;font-weight:700;letter-spacing:0.15em;color:var(--accent);text-transform:uppercase;margin-bottom:1rem;opacity:0;animation:fadeInUp 0.6s 0.1s forwards}
.hero-title{font-size:clamp(2.5rem,8vw,5rem);font-weight:900;line-height:1.1;margin-bottom:1.5rem;color:var(--text-primary);opacity:0;animation:fadeInUp 0.7s 0.2s forwards;letter-spacing:-0.02em}
.hero-title .highlight{background:linear-gradient(135deg,var(--primary),var(--secondary),var(--accent));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.hero-subtitle{font-size:1.25rem;color:var(--text-secondary);max-width:600px;margin-bottom:2rem;opacity:0;animation:fadeInUp 0.7s 0.3s forwards;line-height:1.8}
.hero-stats{display:flex;gap:3rem;flex-wrap:wrap;margin:3rem 0;opacity:0;animation:fadeInUp 0.7s 0.4s forwards}
.stat-item{display:flex;flex-direction:column;}
.stat-number{font-size:2.5rem;font-weight:900;background:linear-gradient(135deg,var(--primary),var(--secondary));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
.stat-label{font-size:12px;font-weight:600;letter-spacing:0.1em;color:var(--text-secondary);text-transform:uppercase;margin-top:0.5rem}
@keyframes fadeInUp{from{opacity:0;transform:translateY(30px)}to{opacity:1;transform:translateY(0)}}
@keyframes slideDown{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
.section{margin-bottom:8rem;padding:4rem 0;position:relative}
.section-header{display:flex;align-items:flex-end;gap:2rem;margin-bottom:3rem;padding-bottom:2rem;border-bottom:2px solid rgba(81,43,212,0.1)}
.section-number{font-size:4rem;font-weight:900;color:rgba(81,43,212,0.15);line-height:1}
.section-title{font-size:2.5rem;font-weight:800;color:var(--text-primary);margin-bottom:0.5rem}
.section-desc{font-size:1.1rem;color:var(--text-primary);max-width:700px;opacity:0.9}
.nodes{display:flex;flex-direction:column;gap:1rem}
.node{border:1.5px solid rgba(81,43,212,0.15);border-radius:12px;background:rgba(255,255,255,0.6);backdrop-filter:blur(10px);cursor:pointer;overflow:hidden;transition:all 0.3s cubic-bezier(0.4,0,0.2,1);position:relative}
.node::before{content:'';position:absolute;top:0;left:0;width:100%;height:100%;background:linear-gradient(135deg,rgba(81,43,212,0.05),rgba(0,188,242,0.05));opacity:0;transition:opacity 0.3s}
.node:hover{border-color:var(--primary);background:rgba(255,255,255,0.8);box-shadow:0 20px 40px rgba(81,43,212,0.1);transform:translateY(-4px)}
.node:hover::before{opacity:1}
.node.open{border-color:var(--secondary);background:rgba(255,255,255,0.9);box-shadow:0 20px 50px rgba(0,120,212,0.15)}
.hdr{display:flex;align-items:center;gap:1rem;padding:1.25rem 1.5rem;cursor:pointer;transition:background 0.2s;position:relative;z-index:2}
.dot{width:12px;height:12px;border-radius:50%;flex-shrink:0;box-shadow:0 0 10px currentColor;transition:transform 0.3s}
.node:hover .dot{transform:scale(1.3)}
.lbl{font-size:1rem;font-weight:700;color:var(--text-primary);flex:1;line-height:1.4}
.why{font-size:0.9rem;font-weight:600;color:var(--text-primary);margin:0 0.75rem;opacity:0.8}
.chv{font-size:12px;color:var(--secondary);transition:transform 0.3s cubic-bezier(0.4,0,0.2,1);flex-shrink:0;display:inline-block;font-weight:700}
.node.open .chv{transform:rotate(90deg);color:var(--primary)}
.body{display:none;padding:0 1.5rem 1.5rem;border-top:1px solid rgba(81,43,212,0.1);animation:slideDown 0.3s ease;position:relative;z-index:1}
.node.open .body{display:block}
.desc{font-size:0.95rem;color:var(--text-primary);line-height:1.8;margin:1rem 0 1.25rem;opacity:0.95}
.tags{display:flex;flex-wrap:wrap;gap:0.5rem;margin:1rem 0}
.tag{font-size:0.75rem;font-weight:700;padding:0.4rem 0.85rem;border-radius:99px;background:linear-gradient(135deg,var(--primary),#6a2fb1);color:#fff;border:none;transition:all 0.2s;box-shadow:0 2px 8px rgba(81,43,212,0.3)}
.tag:hover{background:linear-gradient(135deg,#6a2fb1,var(--primary));transform:translateY(-2px);box-shadow:0 4px 12px rgba(81,43,212,0.4)}
.subs{display:flex;flex-direction:column;gap:0.75rem;margin:1.25rem 0}
.sub{border:1px solid rgba(81,43,212,0.1);border-radius:8px;padding:1rem;background:rgba(81,43,212,0.02);transition:all 0.2s}
.sub:hover{border-color:var(--primary);background:rgba(81,43,212,0.05)}
.sub-t{font-size:0.9rem;font-weight:700;color:var(--text-primary);margin-bottom:0.5rem}
.sub-d{font-size:0.87rem;color:var(--text-primary);line-height:1.7;font-weight:500}
.tip{font-size:0.9rem;padding:1rem;border-radius:8px;border-left:3px solid var(--success);background:rgba(16,124,16,0.08);color:#065f0f;margin-top:1rem;line-height:1.6}
.warn{font-size:0.9rem;padding:1rem;border-radius:8px;border-left:3px solid var(--warning);background:rgba(255,185,0,0.08);color:#8b6914;margin-top:1rem;line-height:1.6}
@media(max-width:768px){.hero{padding:2rem 1rem;min-height:auto}.hero-title{font-size:2rem}.hero-subtitle{font-size:1rem}.hero-stats{gap:1.5rem}.stat-number{font-size:1.75rem}.section-header{flex-direction:column;align-items:flex-start;gap:1rem;border-bottom:none}.section-number{opacity:0.3}.section-title{font-size:1.5rem}.section-desc{font-size:0.95rem}}
</style>
<body>
<canvas id="canvas-bg"></canvas>
<div class="container">
  <section class="hero">
    <div class="hero-eyebrow">YAZILIM GELİŞTİRİCİLER İÇİN</div>
    <h1 class="hero-title"><span class="highlight">C#</span> Yol Haritası</h1>
    <p class="hero-subtitle">Microsoft'un modern, güçlü ve hızlı programlama dilini derinlemesine öğren. Web API'den veri mühendisliğine kadar tüm alanları kapsayan kapsamlı rehber.</p>
    <div class="hero-stats">
      <div class="stat-item"><div class="stat-number">5</div><div class="stat-label">Ana Aşama</div></div>
      <div class="stat-item"><div class="stat-number">70+</div><div class="stat-label">Başlık</div></div>
      <div class="stat-item"><div class="stat-number">300+</div><div class="stat-label">Etiket & Konsept</div></div>
    </div>
  </section>
  <section id="content" class="section"></section>
</div>

<script>
(function(){const canvas=document.getElementById('canvas-bg');const ctx=canvas.getContext('2d');function resizeCanvas(){canvas.width=window.innerWidth;canvas.height=window.innerHeight;}resizeCanvas();window.addEventListener('resize',resizeCanvas);const particles=[];const codeChars=['</','<','C#','async','await','LINQ','SQL','🔧','⚙️','🚀'];class Particle{constructor(){this.x=Math.random()*canvas.width;this.y=Math.random()*canvas.height;this.vx=(Math.random()-0.5)*0.5;this.vy=(Math.random()-0.5)*0.5;this.size=Math.random()*2+0.5;this.color=`rgba(81,43,212,${Math.random()*0.3+0.1})`;this.char=codeChars[Math.floor(Math.random()*codeChars.length)];}update(){this.x+=this.vx;this.y+=this.vy;if(this.x<0)this.x=canvas.width;if(this.x>canvas.width)this.x=0;if(this.y<0)this.y=canvas.height;if(this.y>canvas.height)this.y=0;}draw(ctx){ctx.fillStyle=this.color;ctx.beginPath();ctx.arc(this.x,this.y,this.size,0,Math.PI*2);ctx.fill();}}for(let i=0;i<50;i++){particles.push(new Particle());}function animate(){ctx.clearRect(0,0,canvas.width,canvas.height);particles.forEach(p=>{p.update();p.draw(ctx);});ctx.strokeStyle='rgba(81,43,212,0.08)';ctx.lineWidth=0.5;for(let i=0;i<particles.length;i++){for(let j=i+1;j<particles.length;j++){const dx=particles[i].x-particles[j].x;const dy=particles[i].y-particles[j].y;const dist=Math.sqrt(dx*dx+dy*dy);if(dist<150){ctx.globalAlpha=1-dist/150;ctx.beginPath();ctx.moveTo(particles[i].x,particles[i].y);ctx.lineTo(particles[j].x,particles[j].y);ctx.stroke();}}}ctx.globalAlpha=1;requestAnimationFrame(animate);}animate();})();const D2=[{phase:"Aşama 1 — C# dil temelleri",items:[{l:"C# ve .NET ekosistemi nedir?",w:"Nereye girdiğini anla",c:"#378ADD",desc:"C# Microsoft tarafından geliştirilmiş, strongly-typed, nesne yönelimli bir dil. .NET (dotnet) ise runtime ve kütüphane ekosistemi. .NET 8 LTS güncel versiyon.",tags:[".NET 8",".NET Core","CLR","JIT","MSIL","NuGet","dotnet CLI","Visual Studio"],subs:[{t:"CLR nedir?",d:"Common Language Runtime — .NET'in çalışma motoru. Garbage collection, JIT, exception handling, security buradan gelir."},{t:"dotnet CLI",d:"dotnet new console, dotnet build, dotnet run, dotnet test. Terminal'den .NET projesi yönetimi."},{t:"NuGet",d:".NET paket yöneticisi. npm gibi. dotnet add package Newtonsoft.Json ile paket ekle."}],tip:"💡 Visual Studio Community (ücretsiz) veya VS Code + C# Dev Kit extension. Rider de çok iyi ama ücretli."},{l:"Tip sistemi & değişkenler",w:"C#'ın güçlü tarafı",c:"#378ADD",desc:"Value types (int, float, bool, struct, enum) vs reference types (class, string, array, delegate). Nullable types (int?), var keyword, const, readonly.",tags:["int","string","bool","var","nullable","const","readonly","record","struct","enum"],subs:[{t:"Value vs reference type",d:"Value type stack'te, reference type heap'te. int a=5; int b=a; bağımsız kopyalar."},{t:"record type",d:"C# 9+. Immutable veri modeli için. record Person(string Name, int Age); otomatik equals."},{t:"string interning",d:"string immutable. Her değiştirmede yeni nesne. StringBuilder büyük concatenation için."}],tip:"💡 var kullan ama tip belli olduğunda."},{l:"OOP temelleri C#'ta",w:"Class, interface, miras",c:"#378ADD",desc:"Class, interface, abstract class, inheritance, sealed, partial class, extension method. C#'ta çoklu kalıtım yok ama çoklu interface implement edilebilir.",tags:["class","interface","abstract","sealed","partial","extension method","property","get/set","record"],subs:[{t:"Interface vs abstract class",d:"Interface: contract, çoklu implement edilebilir. Abstract: shared implementation + contract."},{t:"Extension methods",d:"Mevcut tipe yeni metot ekle, kaynak kodunu değiştirmeden. LINQ'nun temelidir."},{t:"Properties",d:"public string Name { get; set; } — field'a kontrollü erişim. init keyword ile immutable property (C# 9)."}],warn:"⚠️ sealed class'ı miras alınamazsın. string sealed'dır mesela."},{l:"Exception handling & null safety",w:"Güvenli kod yaz",c:"#378ADD",desc:"try/catch/finally, custom exception, exception filter (when), using statement. Null handling: null coalescing (??), null conditional (?.), nullable reference types (C# 8+).",tags:["try","catch","finally","throw","ArgumentNullException","??","?.","!","#nullable","using"],subs:[{t:"Nullable reference types",d:"#nullable enable ile string? nullable, string non-null. Compiler null dereferencing'i uyarır."},{t:"using statement",d:"using(var conn = new SqlConnection(...)) { } — scope bitince Dispose çağrılır."},{t:"Exception filter",d:"catch (SqlException ex) when (ex.ErrorCode == -2) { } — spesifik durum yakalama."}],tip:"💡 ArgumentNullException.ThrowIfNull(param) — C# 10+. Tek satırda null check + exception."}]},{phase:"Aşama 2 — Async, LINQ & fonksiyonel özellikler",items:[{l:"Delegates, events & lambda",w:"C#'ın en güçlü özelliği",c:"#EF9F27",desc:"Delegate: tip-güvenli fonksiyon pointer. Action, Func, Predicate. Event: publisher-subscriber pattern. Lambda: (x) => x * 2.",tags:["delegate","Action","Func","Predicate","event","lambda","=>","EventHandler","Closure"],subs:[{t:"Action vs Func",d:"Action: dönüş değeri yok. Func<int,string>: int alır string döner. Predicate<T>: bool döner."},{t:"Closure",d:"Lambda dışarıdaki değişkeni yakalayabilir. Dikkat: loop değişkeni yakalamak klasik tuzak."},{t:"Event pattern",d:"event EventHandler<TEventArgs> MyEvent; — publisher-subscriber. UI, domain event."}],tip:"💡 C# developer'ları 'delegate nedir' sorusuna tam cevap veremezse ciddi boşluk var."},{l:"LINQ (Language Integrated Query)",w:"Veri sorgulama dili içinde",c:"#EF9F27",desc:"IEnumerable üzerinde Where, Select, OrderBy, GroupBy, Join, Aggregate, Any, All, First, Single. Query syntax vs method syntax. Deferred execution.",tags:["LINQ","Where","Select","OrderBy","GroupBy","Join","IEnumerable","IQueryable","deferred execution"],subs:[{t:"Deferred execution",d:"LINQ sorgusu tanımlandığında çalışmaz, iterasyon yapıldığında çalışır. ToList() ile materialize et."},{t:"IEnumerable vs IQueryable",d:"IEnumerable: in-memory, LINQ to Objects. IQueryable: SQL'e çevrilir (EF Core)."},{t:"Method syntax tercih et",d:"var result = list.Where(x => x.Age > 18).OrderBy(x => x.Name);"}],warn:"⚠️ IQueryable'ı IEnumerable'a çok erken dönüştürme."},{l:"Async/await & Task parallelism",w:"Modern C# async programlama",c:"#EF9F27",desc:"async/await, Task<T>, ValueTask, CancellationToken, IAsyncEnumerable, Parallel.ForEach, PLINQ.",tags:["async","await","Task<T>","ValueTask","CancellationToken","ConfigureAwait","Parallel","PLINQ","Channel"],subs:[{t:"async void tehlikesi",d:"async void sadece event handler'da kullan. Exception yakalanamaz, await edilemez."},{t:"ConfigureAwait(false)",d:"Library kodunda mutlaka kullan. Deadlock'u önler."},{t:"CancellationToken",d:"Uzun süren operasyonu iptal etmek için. Her async metoda parametre olarak ekle."}],tip:"💡 await Task.WhenAll(task1, task2) — paralel bekle."},{l:"Pattern matching & modern C#",w:"Dil modern hale geliyor",c:"#EF9F27",desc:"switch expression, is pattern, when guard, positional pattern, record deconstruction, tuple, init property, required modifier, primary constructor (C# 12).",tags:["switch expression","is pattern","tuple","record","required","init","primary ctor","global using"],subs:[{t:"Switch expression",d:"var area = shape switch { Circle c => Math.PI*c.R*c.R, Rectangle r => r.W*r.H, _ => 0 };"},{t:"Tuple",d:"var (name, age) = GetPerson(); — birden fazla değer döndür, destructure et."},{t:"required modifier",d:"public required string Name { get; init; } — object initializer ile set etmek zorunda."}],tip:"💡 C# 12 primary constructor çok kodu azaltıyor."}]},{phase:"Aşama 3 — .NET ekosistemi & ASP.NET Core",items:[{l:"ASP.NET Core Web API",w:"REST API geliştirme",c:"#7F77DD",desc:"Controller, minimal API, middleware, dependency injection, routing, model binding, validation (FluentValidation, DataAnnotations), response caching.",tags:["Controller","Minimal API","middleware","DI","routing","FluentValidation","IActionResult","ProblemDetails"],subs:[{t:"Dependency Injection",d:".NET DI container built-in. AddScoped, AddTransient, AddSingleton. Constructor injection standart."},{t:"Minimal API vs Controller",d:"Minimal API: az kod, hızlı. Controller: daha yapılandırılmış, büyük projeye uygun."},{t:"Middleware pipeline",d:"Request → Auth → Logging → Routing → Controller → Response. Sıra önemli."}],tip:"💡 ASP.NET Core öğrenirken Minimal API ile başla."},{l:"Entity Framework Core",w:"ORM — veritabanı C# ile",c:"#7F77DD",desc:"DbContext, DbSet, migration, Code First, Database First, LINQ sorguları SQL'e dönüşüm, lazy vs eager loading, change tracking.",tags:["DbContext","DbSet","migration","Code First","Include","AsNoTracking","compiled query","Interceptor","Dapper"],subs:[{t:"AsNoTracking",d:"Sadece okuma sorgularında mutlaka kullan. Change tracking kapalı → daha hızlı."},{t:"N+1 problemi EF'de",d:"Include ile eager load kullan. LazyLoading açıksa her navigation property ek sorgu atar."},{t:"Dapper ne zaman?",d:"Karmaşık raw SQL, stored procedure, yüksek performans gereken sorgu için."}],warn:"⚠️ migration'ları production'da dikkatli uygula."},{l:"Dependency Injection & Clean Architecture",w:"Sürdürülebilir kod yapısı",c:"#7F77DD",desc:"SOLID prensipleri C#'ta, Repository pattern, Unit of Work, CQRS (MediatR), Clean Architecture (Domain/Application/Infrastructure/Presentation katmanları).",tags:["SOLID","Repository","Unit of Work","CQRS","MediatR","Clean Architecture","DDD","vertical slice"],subs:[{t:"Repository pattern",d:"Veritabanı erişimini soyutla. IUserRepository — EF Core mu, Dapper mu altında."},{t:"MediatR & CQRS",d:"Command (yazma) ve Query (okuma) ayrımı. MediatR ile handler pattern."},{t:"Clean Architecture",d:"Domain katmanı dışarıya bağımlı değil. Infrastructure değişince Domain değişmez."}],tip:"💡 Jason Taylor'ın CleanArchitecture template'ini incele — endüstri standardı."}]},{phase:"Aşama 4 — Veri alanı (Data Engineering)",items:[{l:"SQL Server & veritabanı derinlemesi",w:"C# ile DB güçlü kombinasyon",c:"#D4537E",desc:"SQL Server (T-SQL), stored procedure, view, index optimizasyonu, partition, query execution plan, AlwaysOn, CDC (Change Data Capture).",tags:["T-SQL","stored procedure","view","index","execution plan","CDC","AlwaysOn","JSON support","temporal table"],subs:[{t:"Execution plan okuma",d:"SET STATISTICS IO ON; ile sorgunun kaç sayfa okuduğunu gör."},{t:"CDC — Change Data Capture",d:"Tablodaki değişiklikleri yakala. Event-driven pipeline için altın değerinde."},{t:"Temporal table",d:"Geçmiş veriyi otomatik kaydet. AS OF SYSTEM TIME ile geçmişteki durumu sorgula."}],tip:"💡 T-SQL'de window function (ROW_NUMBER, RANK, LAG, LEAD) öğren."},{l:"Azure ekosistemi — veri servisleri",w:"Cloud veri platformu",c:"#D4537E",desc:"Azure SQL, Azure Synapse Analytics, Azure Data Lake Storage (ADLS), Azure Databricks (Spark), Azure Stream Analytics, Azure Event Hubs, Power BI embedding.",tags:["Azure Synapse","ADLS","Databricks","Stream Analytics","Event Hubs","Delta Lake","Lakehouse","Power BI"],subs:[{t:"Lakehouse mimarisi",d:"Data Lake esnekliği + Data Warehouse performansı. Delta Lake, Apache Iceberg."},{t:"Azure Event Hubs",d:"Kafka-uyumlu event streaming. IoT, log, clickstream. Partition key ile ölçek."},{t:"Synapse Analytics",d:"Serverless SQL pool (pay-per-query) + Dedicated SQL pool (DWH)."}],tip:"💡 DP-203 (Azure Data Engineer Associate) sertifikası veri alanında iş arama için çok değerli."},{l:"SignalR, gRPC & real-time veri",w:"Canlı veri akışı",c:"#D4537E",desc:"SignalR ile WebSocket tabanlı real-time. gRPC ile high-performance RPC (Protobuf). SSE ile server push. Dashboard, monitoring, IoT veri görselleştirme için şart.",tags:["SignalR","gRPC","Protobuf","SSE","Hub","streaming","IAsyncEnumerable","Channel<T>"],subs:[{t:"SignalR Hub",d:"public class DashboardHub : Hub { public async Task SendData(DataPoint d) => await Clients.All.SendAsync(d); }"},{t:"gRPC streaming",d:"Server streaming, client streaming, bidirectional streaming. IoT sensor verisi için mükemmel."},{t:"Channel<T>",d:"Producer-consumer pattern için built-in. Bounded/unbounded kanal."}],tip:"💡 IoT + gömülü sistemden gelen verinin C# backend'de işlenmesi için SignalR + EF Core + Azure Event Hubs kombinasyonunu incele."}]},{phase:"Aşama 5 — Test, araçlar & ileri seviye",items:[{l:"Unit & integration test",w:"Kaliteli kod güvencesi",c:"#639922",desc:"xUnit, NUnit, Moq, FluentAssertions, TestContainers for .NET, Bogus (fake data), BenchmarkDotNet. TDD yaklaşımı, AAA (Arrange-Act-Assert) pattern.",tags:["xUnit","NUnit","Moq","FluentAssertions","TestContainers","BenchmarkDotNet","Bogus","TDD","AAA"],subs:[{t:"Moq ile mock",d:"var mock = new Mock<IUserRepo>(); mock.Setup(x => x.GetById(1)).Returns(user);"},{t:"TestContainers",d:"Test için gerçek Docker container başlat — SQL Server, Redis, RabbitMQ."},{t:"BenchmarkDotNet",d:"Kod performansını ölç. [Benchmark] attribute, karşılaştırmalı benchmark."}],tip:"💡 FluentAssertions kullan: result.Should().BeEquivalentTo(expected)."},{l:"Performance & memory profiling",w:"Ölçmeden optimize etme",c:"#639922",desc:"dotnet-trace, dotnet-counters, dotnet-dump, Visual Studio Profiler, PerfView, BenchmarkDotNet, JetBrains dotMemory/dotTrace.",tags:["dotnet-trace","dotnet-counters","PerfView","Span<T>","Memory<T>","ArrayPool","ObjectPool","GC","allocation"],subs:[{t:"Span<T> ve Memory<T>",d:"Heap allocation olmadan buffer yönetimi. String parsing, binary protocol, yüksek performans için."},{t:"ArrayPool<T>",d:"Array kiralayıp geri ver. Sürekli new byte[] allocation yerine. GC pressure'u azaltır."},{t:"GC ayarı",d:"GCSettings.LatencyMode = GCLatencyMode.SustainedLowLatency; — real-time benzeri sistemler için."}],warn:"⚠️ Span<T> async metotlarda kullanılamaz — ref struct kısıtı. Memory<T> kullan async context'te."},{l:"Source generator & Roslyn",w:"Derleme zamanı kod üretimi",c:"#639922",desc:"C# 9+ Source Generator ile derleme zamanında kod üret. Serialization (System.Text.Json), DI container, mapper, regex. Roslyn
