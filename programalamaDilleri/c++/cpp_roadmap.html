const root=document.getElementById('root');
D.forEach(phase=>{
  const pDiv=document.createElement('div');
  pDiv.innerHTML=`<div class="phase">${phase.phase}</div>`;
  const nDiv=document.createElement('div');
  nDiv.className='nodes';
  phase.items.forEach(item=>{
    const colors={blue:'#378ADD',teal:'#1D9E75',amber:'#BA7517',coral:'#D85A30',purple:'#7F77DD',green:'#639922',gray:'#888780'};
    const n=document.createElement('div');
    n.className='node';
    const tagsHtml=item.tags.map(t=>`<span class="tag t-${item.c}">${t}</span>`).join('');
    const subsHtml=(item.subs||[]).map(s=>`<div class="sub"><div class="sub-t">${s.t}</div><div class="sub-d">${s.d}</div></div>`).join('');
    const tipHtml=item.tip?`<div class="tip">${item.tip}</div>`:'';
    const warnHtml=item.warn?`<div class="warn">${item.warn}</div>`:'';
    n.innerHTML=`
      <div class="hdr">
        <div class="dot" style="background:${colors[item.c]}"></div>
        <div class="lbl">${item.l}</div>
        <div class="why">${item.w}</div>
        <div class="chv">▶</div>
      </div>
      <div class="body">
        <div class="desc">${item.desc}</div>
        <div class="tags">${tagsHtml}</div>
        ${subsHtml?`<div class="subs">${subsHtml}</div>`:''}
        ${tipHtml}${warnHtml}
      </div>`;
    n.querySelector('.hdr').addEventListener('click',()=>n.classList.toggle('open'));
    nDiv.appendChild(n);
  });
  pDiv.appendChild(nDiv);
  root.appendChild(pDiv);
});
</script>
